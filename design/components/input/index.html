<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input — ServerManager Design System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Mirrors apps/web/tailwind.config.js so previews match the live app.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0f0f0f',
              surface: '#1a1a1a',
              'surface-2': '#242424',
              border: '#2a2a2a',
              'border-hover': '#3a3a3a',
              accent: { DEFAULT: '#22c55e', hover: '#16a34a', muted: '#14532d' },
              muted: '#6b7280',
              'text-primary': '#f9fafb',
              'text-secondary': '#9ca3af',
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-background text-text-primary font-sans antialiased p-10">
    <div class="max-w-md mx-auto space-y-10">
      <header>
        <h1 class="text-xl font-semibold">Input</h1>
        <p class="text-sm text-text-secondary mt-1">
          Source: <code class="text-accent">apps/web/src/components/ui/input.tsx</code>
        </p>
      </header>

      <section class="space-y-4">
        <h2 class="text-xs uppercase tracking-wide text-text-secondary">States</h2>

        <div class="space-y-1.5">
          <span class="block text-xs text-text-secondary">Placeholder</span>
          <input placeholder="server-name" class="flex h-9 w-full rounded-md border border-border bg-surface-2 px-3 py-1 text-sm text-text-primary placeholder:text-text-secondary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-colors" />
        </div>

        <div class="space-y-1.5">
          <span class="block text-xs text-text-secondary">Filled</span>
          <input value="survival-01" class="flex h-9 w-full rounded-md border border-border bg-surface-2 px-3 py-1 text-sm text-text-primary placeholder:text-text-secondary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-colors" />
        </div>

        <div class="space-y-1.5">
          <span class="block text-xs text-text-secondary">Focus ring (simulated)</span>
          <input value="focused" class="flex h-9 w-full rounded-md border border-transparent bg-surface-2 px-3 py-1 text-sm text-text-primary outline-none ring-2 ring-accent transition-colors" />
        </div>

        <div class="space-y-1.5">
          <span class="block text-xs text-text-secondary">Disabled</span>
          <input value="locked" disabled class="flex h-9 w-full rounded-md border border-border bg-surface-2 px-3 py-1 text-sm text-text-primary cursor-not-allowed opacity-50 transition-colors" />
        </div>
      </section>

      <section class="space-y-1.5">
        <h2 class="text-xs uppercase tracking-wide text-text-secondary">With label</h2>
        <label class="text-sm font-medium text-text-secondary leading-none" for="port">Port</label>
        <input id="port" value="25565" class="flex h-9 w-full rounded-md border border-border bg-surface-2 px-3 py-1 text-sm text-text-primary placeholder:text-text-secondary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-colors mt-1.5" />
      </section>
    </div>
  </body>
</html>
