<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge — ServerManager Design System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Mirrors apps/web/tailwind.config.js so previews match the live app.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0f0f0f',
              surface: '#1a1a1a',
              'surface-2': '#242424',
              border: '#2a2a2a',
              'border-hover': '#3a3a3a',
              accent: { DEFAULT: '#22c55e', hover: '#16a34a', muted: '#14532d' },
              muted: '#6b7280',
              'text-primary': '#f9fafb',
              'text-secondary': '#9ca3af',
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-background text-text-primary font-sans antialiased p-10">
    <div class="max-w-3xl mx-auto space-y-10">
      <header>
        <h1 class="text-xl font-semibold">Badge</h1>
        <p class="text-sm text-text-secondary mt-1">
          Source: <code class="text-accent">apps/web/src/components/ui/badge.tsx</code>
        </p>
      </header>

      <!-- Variants -->
      <section class="space-y-3">
        <h2 class="text-xs uppercase tracking-wide text-text-secondary">Variants</h2>
        <div class="flex flex-wrap items-center gap-3">
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-surface-2 text-text-primary">Default</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-green-900/40 text-green-400 border border-green-800/50">Success</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-yellow-900/40 text-yellow-400 border border-yellow-800/50">Warning</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-red-900/40 text-red-400 border border-red-800/50">Error</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-surface-2 text-text-secondary">Muted</span>
        </div>
      </section>

      <!-- Status badges -->
      <section class="space-y-3">
        <h2 class="text-xs uppercase tracking-wide text-text-secondary">Status (StatusBadge)</h2>
        <div class="flex flex-wrap items-center gap-3">
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-green-900/40 text-green-400 border border-green-800/50"><span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>online</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-yellow-900/40 text-yellow-400 border border-yellow-800/50"><span class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></span>starting</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-yellow-900/40 text-yellow-400 border border-yellow-800/50"><span class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></span>stopping</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-surface-2 text-text-secondary"><span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span>offline</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-red-900/40 text-red-400 border border-red-800/50"><span class="w-1.5 h-1.5 rounded-full bg-red-400"></span>crashed</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-yellow-900/40 text-yellow-400 border border-yellow-800/50"><span class="w-1.5 h-1.5 rounded-full bg-orange-400"></span>startup_failure</span>
          <span class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium bg-red-900/40 text-red-400 border border-red-800/50"><span class="w-1.5 h-1.5 rounded-full bg-red-400"></span>error</span>
        </div>
      </section>
    </div>
  </body>
</html>
