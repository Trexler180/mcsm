<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Baseline CSP safe for both the Vite dev server and a production build:
      blocks plugin/object execution and <base> hijacking. A full policy that
      also constrains script-src/connect-src belongs at the reverse proxy that
      serves this bundle in production (it would break Vite HMR if set here);
      see docs/deployment.md.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="object-src 'none'; base-uri 'self'"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MCSM" />
    <meta name="description" content="Mod-aware operations panel for Minecraft servers" />
    <title>MCSM</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
