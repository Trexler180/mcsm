services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "8080"
      DATABASE_PATH: /data/api/mcsm.db
      SERVER_ROOT: /data/servers
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      RESET_ADMIN_PASSWORD: ${RESET_ADMIN_PASSWORD:-0}
      AUTO_REGISTER_LOCAL_AGENT: "1"
      LOCAL_AGENT_NAME: Local Agent
      LOCAL_AGENT_FQDN: agent
      LOCAL_AGENT_PORT: "8090"
      LOCAL_AGENT_SCHEME: http
      LOCAL_AGENT_TOKEN: ${AGENT_TOKEN:?set AGENT_TOKEN}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - mcsm-api-data:/data/api
      - mcsm-servers:/data/servers
    depends_on:
      - agent

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    environment:
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: "8090"
      AGENT_TOKEN: ${AGENT_TOKEN:?set AGENT_TOKEN}
      AGENT_SERVER_ROOT: /data/servers
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - mcsm-servers:/data/servers

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api

volumes:
  mcsm-api-data:
  mcsm-servers:
